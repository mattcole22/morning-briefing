name: Portfolio Morning Briefing

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  generate-briefing:
    name: Generate & Email Morning Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install anthropic zoneinfo 2>/dev/null || pip install anthropic

      - name: Run morning briefing
       env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python scripts/run_briefing.py

      - name: Upload briefing as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_id }}
          path: /tmp/briefing_*.md
          if-no-files-found: ignore
          retention-days: 30
